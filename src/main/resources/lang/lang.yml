# ── Title & Action Bar ────────────────────────
title:
  login-success-main: "<gradient:#a855f7:#ff6eb4><bold>✓ Добро пожаловать!</bold></gradient>"
  login-success-sub: "<gray>Вы успешно авторизованы"
  register-success-main: "<gradient:#22c55e:#a855f7><bold>✓ Аккаунт создан!</bold></gradient>"
  register-success-sub: "<gray>Добро пожаловать на сервер"
  account-locked-main: "<dark_red><bold>⛔ Аккаунт заблокирован</bold></dark_red>"
  account-locked-sub: "<gray>Обратитесь к администратору"

actionbar:
