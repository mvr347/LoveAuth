# Префикс — используется в каждом сообщении через {prefix}
prefix: "<gradient:#ff6eb4:#a855f7><bold>LoveAuth</bold></gradient><dark_gray> » </dark_gray>"

# ── Общие ───────────────────────────────────
general:
  no-permission: "{prefix}<red>У вас недостаточно прав."
  player-only: "{prefix}<red>Эта команда только для игроков."
  unknown-command: "{prefix}<red>Неизвестная подкоманда. Используйте <white>/loveauth help</white>."
  player-not-found: "{prefix}<red>Игрок <white>{player}</white> не найден."
  reloaded: "{prefix}<green>Конфигурация и языковые файлы успешно перезагружены."
  reload-error: "{prefix}<red>Ошибка при перезагрузке: <white>{error}</white>"
  database-error: "{prefix}<red>Внутренняя ошибка базы данных. Попробуйте позже."
  invalid-input: "{prefix}<red>Некорректный ввод."
  wait-action: "{prefix}<yellow>Подождите перед следующим действием."
  command-usage: "{prefix}<red>Использование: <white>{usage}</white>"
  player-kicked: "{prefix}<yellow>Игрок <white>{player}</white> отключён."
  restart-kick: "{prefix}<red>Сервер перезапускает систему авторизации. Подключитесь позже."

# ── Авторизация ─────────────────────────────
auth:
  already-logged-in: "{prefix}<yellow>Вы уже авторизованы."
  not-logged-in: "{prefix}<red>Сначала авторизуйтесь."
  timeout: "{prefix}<red>Время авторизации истекло. Подключитесь снова."
  success: "{prefix}<green>Добро пожаловать, <white>{player}</white>!"
  session-restored: "{prefix}<green>Сессия восстановлена. Добро пожаловать!"
  not-registered: "{prefix}<red>Аккаунт ещё не зарегистрирован."
  already-registered: "{prefix}<yellow>Аккаунт уже зарегистрирован."
  premium-skip: "{prefix}<green>Premium-вход подтверждён."
  rate-limited: "{prefix}<red>Слишком много действий. Попробуйте через несколько секунд."
  premium-skip-reminder: "{prefix}<gray>Вы можете настроить пароль или Discord в любой момент: <click:run_command:'/loveauth account'><white><underlined>/loveauth account</underlined></white></click>"

# ── Вход по паролю ──────────────────────────
login:
  prompt-chat: "{prefix}<gray>Введите ваш пароль в чат:"
  success: "{prefix}<green>Вы успешно вошли!"
  fail: "{prefix}<red>Неверный пароль. Осталось попыток: <white>{attempts}</white>."
  fail-last: "{prefix}<dark_red>Неверный пароль. Это была последняя попытка!"
  password-disabled: "{prefix}<red>Вход по паролю отключён для этого аккаунта."

# ── Регистрация ─────────────────────────────
register:
  prompt-password: "{prefix}<gray>Придумайте пароль и введите его в чат:"
  prompt-confirm: "{prefix}<gray>Повторите пароль для подтверждения:"
  password-mismatch: "{prefix}<red>Пароли не совпадают. Начните заново."
  password-too-short: "{prefix}<red>Пароль слишком короткий. Минимум 3 символа."
  success: "{prefix}<green>Регистрация успешна! Добро пожаловать, <white>{player}</white>!"
  password-length: "{prefix}<red>Пароль должен быть от {min} до {max} символов."
  password-invalid-chars: "{prefix}<red>Пароль содержит недопустимые символы или смайлики."

# ── Блокировки ──────────────────────────────
block:
  ip-locked: "{prefix}<red>Ваш IP заблокирован на <white>{minutes}</white> мин. из-за подозрительной активности."
  account-locked: "{prefix}<dark_red>Ваш аккаунт заблокирован. Обратитесь к администратору."
  account-unlocked: "{prefix}<green>Аккаунт игрока <white>{player}</white> разблокирован."
  password-required: "{prefix}<red>Нельзя отключить пароль без привязанного Discord."

# ── Очередь ─────────────────────────────────
queue:
  position: "{prefix}<gray>Вы в очереди. Позиция: <white>{position}</white> из <white>{total}</white>."
  wait-time: "{prefix}<gray>Примерное время ожидания: <white>{time}</white>."
  connecting: "{prefix}<green>Ваша очередь подошла! Подключаемся..."
  left: "{prefix}<yellow>Вы покинули очередь."
  not-in-queue: "{prefix}<yellow>Игрок не находится в очереди."

# ── Защита ──────────────────────────────────
protection:
  command-blocked: "{prefix}<red>Эта команда недоступна до авторизации."

# ── Кики ────────────────────────────────────
kick:
  closed-gui: "<gradient:#ff6eb4:#a855f7>LoveAuth</gradient> <dark_gray>»</dark_gray> <red>Вы закрыли меню авторизации. Подключитесь снова."
  timeout: "<gradient:#ff6eb4:#a855f7>LoveAuth</gradient> <dark_gray>»</dark_gray> <red>Время авторизации истекло. Подключитесь снова."

# ── Discord ──────────────────────────────────
discord:
  not-enabled: "{prefix}<red>Discord-интеграция отключена на этом сервере."
  bind-instructions: "{prefix}<gray>Код для привязки: <click:copy_to_clipboard:'/link {code}'><hover:show_text:'<gray>Нажмите, чтобы скопировать <white>/link {code}'><white><underlined>{code}</underlined></white></hover></click> <gray>(отправьте в DM боту)"
  bind-success: "{prefix}<green>Discord-аккаунт успешно привязан!"
  bind-fail: "{prefix}<red>Неверный или устаревший код. Попробуйте снова."
  already-bound: "{prefix}<yellow>Discord уже привязан к вашему аккаунту."
  login-started: "{prefix}<gray>Подтвердите вход в Discord-боте."
  confirmation-sent: "{prefix}<gray>Код подтверждения отправлен в ваш Discord (действителен 1 мин)."
  prompt-confirmation: "{prefix}<gray>Введите код из Discord:"
  wrong-code: "{prefix}<red>Неверный или устаревший код подтверждения."
  unlinked: "{prefix}<yellow>Discord успешно отвязан."
  not-bound: "{prefix}<red>У вас не привязан Discord-аккаунт."
  link-invalid-code: "❌ Неверный или устаревший код. Попробуйте снова через /loveauth account"
  already-bound-other: "❌ Этот Discord уже привязан к другому аккаунту."
  link-success-dm: "✅ Аккаунт Minecraft успешно привязан!"
  login-embed-title: "🔐 Запрос на вход"
  login-embed-desc: "Игрок **{player}** пытается войти на сервер.\nЭто вы?"
  login-btn-confirm: "Подтвердить вход"
  login-btn-deny: "Отклонить"
  login-dm-sent: "{prefix}<gray>Запрос на вход отправлен в Discord. Подтвердите там."
  login-timeout: "<gradient:#ff6eb4:#a855f7>LoveAuth</gradient> <dark_gray>»</dark_gray> <red>Время ожидания входа через Discord истекло."
  login-approved: "{prefix}<green>Вход через Discord подтверждён!"
  login-denied-kick: "<gradient:#ff6eb4:#a855f7>LoveAuth</gradient> <dark_gray>»</dark_gray> <red>Вход отклонён через Discord."
  login-confirmed-dm: "✅ Вход подтверждён. Добро пожаловать на сервер!"
  login-denied-dm: "❌ Вход отклонён."
  login-expired: "⏰ Запрос устарел."
  confirm-action-title: "❓ Подтверждение действия"
  action-btn-confirm: "Подтвердить"
  action-btn-deny: "Отмена"
  confirmation-sent-buttons: "{prefix}<gray>Запрос подтверждения отправлен в Discord."
  action-unlink: "Вы действительно хотите отвязать Discord?"
  action-remove_password: "Вы действительно хотите удалить пароль?"
  action-lock_account: "Вы действительно хотите заблокировать свой аккаунт?"
  account-locked-self: "{prefix}<yellow>Ваш аккаунт заблокирован по вашему запросу."
  help-header: "📋 **Команды LoveAuth бота:**"
  help-link: "`/link <код>` — привязать аккаунт"
  help-unlink: "`/unlink` — отвязать аккаунт"
  help-lock: "`/lock` — заблокировать аккаунт"
  help-unlock: "`/unlock` — разблокировать аккаунт"
  help-password-change: "`/password change <новый_пароль>` — изменить пароль"
  help-password-delete: "`/password delete` — удалить пароль"
  help-password-set: "`/password set <пароль>` — установить новый пароль"
  help-info: "`/info` — информация об аккаунте"
  help-help: "`/help` — показать это сообщение"
  link-usage: "❌ Использование: /link <код>"
  not-bound-dm: "❌ У вас нет привязанного аккаунта Minecraft."
  unlinked-dm: "✅ Аккаунт отвязан."
  unlocked-dm: "✅ Ваш аккаунт разблокирован."
  locked-dm: "✅ Ваш аккаунт заблокирован."
  amnesty-done-dm: "✅ Все блокировки сняты (амнистия)."
  info-title: "📊 Информация об аккаунте"
  info-player: "Игрок"
  info-status: "Статус"
  lock-btn-alert: "Это не я! ЗАБЛОКИРОВАТЬ АККАУНТ"
  password-changed-dm: "✅ Пароль успешно изменён."
  password-deleted-dm: "✅ Пароль удалён. Теперь вход только через Discord."
  admin-embed-title: "🛡️ Подтверждение админ-действия"
  admin-embed-desc: "Вы пытаетесь выполнить команду: **{cmd}**\nЭто вы?"

# ── GUI: общие ──────────────────────────────
gui:
  close-button: "<red>✖ Закрыть"
  back-button: "<gray>← Вернуться"
  confirm-button: "<green>✔ Подтвердить"
  cancel-button: "<red>✖ Отмена"
  filler-name: " "
  unavailable: "<red>Недоступно"
  player-head: "<yellow>{player}"

# ── GUI: выбор метода входа ──────────────────
gui.auth-method:
  title: "<gradient:#ff6eb4:#a855f7>Авторизация</gradient>"
  password-button: "<green><bold>🔑 Войти по паролю</bold>"
  password-lore:
    - "<gray>Введите ваш пароль"
    - "<gray>для входа на сервер"
  discord-button: "<#7289da><bold>🎮 Войти через Discord</bold>"
  discord-lore:
    - "<gray>Привяжите аккаунт Discord"
    - "<gray>для быстрого входа"
  discord-disabled-lore:
    - "<red>Discord-интеграция"
    - "<red>отключена на сервере"

# ── GUI: подменю пароля ──────────────────────
gui.password:
  title: "<gradient:#ff6eb4:#a855f7>Вход по паролю</gradient>"
  enter-button: "<green><bold>🔑 Ввести пароль"
  enter-lore:
    - "<gray>Нажмите, чтобы"
    - "<gray>ввести пароль"

# ── GUI: подменю Discord ─────────────────────
gui.discord:
  title: "<gradient:#7289da:#a855f7>Discord</gradient>"
  bind-button: "<#7289da><bold>🔗 Привязать Discord"
  bind-lore:
    - "<gray>Привяжите ваш"
    - "<gray>Discord-аккаунт"
  unlink-button: "<red><bold>🔗 Отвязать Discord"
  unlink-lore:
    - "<gray>Разорвать связь с"
    - "<gray>Discord-аккаунтом"
  toggle-password-on: "<yellow><bold>🔒 Включить пароль"
  toggle-password-off: "<yellow><bold>🔓 Выключить пароль"
  toggle-lore:
    - "<gray>Включить или выключить"
    - "<gray>вход по паролю"
  toggle-locked: "<dark_gray><bold>🔒 Управление паролем"
  toggle-locked-lore:
    - "<red>Привяжите Discord чтобы"
    - "<red>управлять этой настройкой"

# ── GUI: регистрация ─────────────────────────
gui.register:
  title: "<gradient:#ff6eb4:#a855f7>Регистрация</gradient>"
  register-button: "<green><bold>📝 Зарегистрироваться"
  register-lore:
    - "<gray>Создайте аккаунт"
    - "<gray>для игры на сервере"

# ── GUI: Premium при первом входе ────────────
gui.premium-welcome:
  title: "<gradient:#ffd700:#ff6eb4>Добро пожаловать!</gradient>"
  add-password-button: "<green><bold>🔑 Добавить пароль"
  add-password-lore:
    - "<gray>Защитите аккаунт паролем"
  bind-discord-button: "<#7289da><bold>🎮 Привязать Discord"
  bind-discord-lore:
    - "<gray>Привяжите Discord-аккаунт"
  skip-button: "<gray><bold>→ Пропустить"
  skip-lore:
    - "<gray>Войти без настройки"

# ── GUI: управление аккаунтом ────────────────
gui.account:
  title: "<gradient:#ff6eb4:#a855f7>Мой аккаунт</gradient>"
  set-password: "<green><bold>🔑 Привязать пароль"
  set-password-lore:
    - "<gray>Установить пароль"
    - "<gray>для защиты аккаунта"
  change-password: "<yellow><bold>🔑 Сменить пароль"
  change-password-lore:
    - "<gray>Изменить текущий пароль"
  delete-password: "<red><bold>✖ Удалить пароль"
  delete-password-lore:
    - "<gray>Удалить пароль (требуется"
    - "<gray>привязанный Discord)"
  delete-password-locked: "<dark_gray><bold>✖ Удалить пароль"
  delete-password-locked-lore:
    - "<red>Сначала привяжите Discord"
    - "<red>чтобы удалить пароль"
  lock-account: "<dark_red><bold>🔒 Заблокировать аккаунт"
  lock-account-lore:
    - "<gray>Заблокировать аккаунт вручную"
    - "<gray>для защиты от взлома"
    - "<gray>(Требуется Discord)"
  session-info: "<aqua><bold>⏱ Управление сессией"
  session-lore:
    - "<gray>Текущая сессия: <white>{status}</white>"
    - "<gray>Истекает: <white>{expires}</white>"
    - "<gray>Нажмите для настройки"
  session-unavailable: "<dark_gray><bold>⏱ Сессии недоступны"
  session-unavailable-lore:
    - "<gray>Установите пароль чтобы"
    - "<gray>управлять сессиями"
  input-method: "<light_purple><bold>⌨ Метод ввода пароля"
  input-method-lore:
    - "<gray>Текущий метод: <white>{method}</white>"
    - "<gray>Нажмите для смены"
  logout: "<red><bold>🚪 Выйти из аккаунта"
  logout-lore:
    - "<gray>Завершить текущую сессию"
  session-active: "активна"
  session-disabled: "отключена"
  session-expired: "истекла"
  input-chat: "чат"
  input-sign: "табличка"

# ── GUI: сессии ─────────────────────────────
gui.session:
  disable: "<red><bold>✖ Отключить сессию"
  days: "<aqua><bold>⏱ Длительность: <white>{days} дн."
  cycle-lore:
    - "<gray>ЛКМ: <green>+1 день"
    - "<gray>ПКМ: <red>-1 день"
    - "<gray>Максимум: <white>28 дней"
    - "<gray>(Настройка будет применена"
    - "<gray>при следующем входе)"

# ── GUI: очередь ────────────────────────────
gui.queue:
  title: "<gradient:#ff6eb4:#a855f7>Очередь</gradient>"
  position-item: "<white><bold>📋 Позиция в очереди"
  position-lore:
    - "<gray>Ваша позиция: <white>{position}</white>"
    - "<gray>Всего в очереди: <white>{total}</white>"
    - "<gray>Ожидание: <white>~{time}</white>"
  refresh-button: "<green>↻ Обновить"

# ── GUI: подтверждение ───────────────────────
gui.confirm:
  title: "<red>Подтверждение действия"
  description-item: "<white><bold>⚠ Вы уверены?"
  change-password: "<white><bold>Изменить пароль?"
  reset-session: "<white><bold>Сбросить сессию?"
  lock-account: "<white><bold>Заблокировать аккаунт?"
  logout: "<white><bold>Выйти из аккаунта?"
  admin-panel: "<white><bold>Открыть админ-панель?"

# ── GUI: Админ-панель ────────────────────────
gui.admin:
  title: "<gradient:#ff0000:#a855f7>Админ-панель</gradient>"
  locked-accounts: "<red><bold>🔒 Заблокированные аккаунты"
  locked-accounts-lore:
    - "<gray>Количество: <white>{count}</white>"
  unlock-player: "<green><bold>🔓 Разблокировать игрока"
  unlock-player-lore:
    - "<gray>Введите ник в чат"
  stats: "<aqua><bold>📊 Статистика"
  stats-lore:
    - "<gray>Онлайн: <white>{online}</white>"
    - "<gray>Зарегистрировано: <white>{registered}</white>"
    - "<gray>Заблокировано: <white>{locked}</white>"
  sessions: "<yellow><bold>⏱ Управление сессиями"
  sessions-lore:
    - "<gray>Активных сессий: <white>{sessions}</white>"
  admin-password-prompt: "{prefix}<gray>Введите ваш admin-пароль для подтверждения:"
  admin-password-set-prompt: "{prefix}<gray>Введите новый admin-пароль:"
  admin-password-not-set: "{prefix}<red>Сначала установите admin-пароль: <white>/ladmin setadminpass</white>."
  admin-password-invalid: "{prefix}<red>Неверный admin-пароль."
  admin-password-locked: "{prefix}<dark_red>Слишком много неверных попыток admin-пароля. Подождите {minutes} мин."
  admin-password-set: "{prefix}<green>Admin-пароль сохранён."
  unlock-prompt: "{prefix}<gray>Введите ник игрока для разблокировки:"
  session-reset-prompt: "{prefix}<gray>Введите ник игрока для сброса сессии:"
  no-locked: "{prefix}<green>Заблокированных аккаунтов нет."
  locked-list-header: "{prefix}<red>Заблокированные аккаунты:"
  locked-list-entry: "  <gray>- <white>{player}"
  clear-ip-blocks: "<light_purple><bold>🔥 Очистить IP-блоки"
  clear-ip-blocks-lore:
