# ╔══════════════════════════════════════════╗
# ║         LoveAuth — Конфигурация          ║
# ╚══════════════════════════════════════════╝

# ── База данных ─────────────────────────────
database:
  # Имя файла SQLite (будет создан в папке плагина)
  file: "loveauth.db"

# ── Безопасность ────────────────────────────
security:
  # Pepper добавляется к паролю перед Argon2-хэшированием.
  # Генерируется автоматически при первом запуске — НЕ МЕНЯТЬ после создания аккаунтов!
  pepper: ""
  # AES-256-GCM ключ для шифрования чувствительных данных в БД.
  # Генерируется автоматически при первом запуске — НЕ МЕНЯТЬ!
  master-key: ""
  # Количество итераций Argon2id (10-14 рекомендуется; выше = медленнее, но безопаснее)
  argon2-iterations: 10

# ── Сессии ──────────────────────────────────
session:
  # Включить сессии (false = вводить пароль при каждом входе)
  enabled: true
  # Длительность сессии в днях (1–28); 0 = сессии отключены
  duration-days: 7
  # Сбрасывать сессию при смене IP-адреса
  bind-to-ip: true

# ── Авторизация ─────────────────────────────
auth:
  # Секунд на прохождение авторизации/регистрации (после — кик)
  timeout-seconds: 90
  # Максимум неверных попыток ввода пароля до блокировки IP
  max-attempts: 3
  # Время блокировки IP в минутах после исчерпания попыток
  lockout-duration-minutes: 60
  # Пропускать авторизацию для лицензионных игроков
  premium-skip: true

# ── Протокольная проверка лицензии ───────────
# Реальная криптографическая проверка лицензионности через хендшейк Mojang.
premium-verification:
  # Включить протокольную проверку (по умолчанию выключено — опасная фича)
  enabled: true
  # Сколько миллисекунд ждать ответа клиента на каждом шаге хендшейка
  timeout-ms: 5000
  # Запрещать вход с нелицензии под ником, который на этом сервере уже
  # зарегистрирован как лицензионный аккаунт (т.е. однажды зашёл с лицензии).
  # Ник, который ещё никогда не регистрировался, никогда не блокируется -
  # первый вход сам определяет тип аккаунта (лицензия/пиратка) на будущее.
  # Работает только когда протокольная проверка активна.
  block-cracked-with-premium-name: true

# ── Очередь ─────────────────────────────────
queue:
  # Включить систему очереди
  enabled: false
  # Максимум игроков онлайн (при достижении — остальные в очередь)
  max-players: 100

# ── Limbo-мир ───────────────────────────────
limbo:
  # Включить Limbo-мир (если false — игрок остаётся на месте спавна)
  enabled: true
  # Название void-мира для неавторизованных игроков
  world-name: "loveauth_limbo"

# ── Телепорт после регистрации ──────────────
# Телепортировать игрока на спавн указанного мира после ПЕРВОЙ регистрации
# (повторные входы телепорт не затрагивают — игрок остаётся там, где был).
register-spawn:
  enabled: false
  world: "world"

# ── Ввод пароля ─────────────────────────────
# Метод по умолчанию для новых игроков (CHAT или SIGN)
# Каждый игрок может сменить в своих настройках (/loveauth account)
default-input-method: "CHAT"

# ── Discord-интеграция ───────────────────────
discord:
  # Включить возможность входа/привязки через Discord-бота
  enabled: true
  # Токен Discord-бота (требуется если enabled: true)
  bot-token: ''
  # ID сервера Discord
  guild-id: ''
  # Список Discord ID администраторов для доступа к /admin в боте
  admin-ids: []

# ── Язык ────────────────────────────────────
# Файл языка: plugins/LoveAuth/lang/lang.yml
language: "lang"
