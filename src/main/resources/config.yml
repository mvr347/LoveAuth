# ╔══════════════════════════════════════════╗
# ║         LoveAuth — Конфигурация          ║
# ╚══════════════════════════════════════════╝

# ── База данных ─────────────────────────────
database:
  # Имя файла SQLite (будет создан в папке плагина)
  file: "loveauth.db"

# ── Безопасность ────────────────────────────
security:
  # Pepper добавляется к паролю перед BCrypt-хэшированием.
  # Генерируется автоматически при первом запуске — НЕ МЕНЯТЬ после создания аккаунтов!
  pepper: ""
  # AES-256-GCM ключ для шифрования чувствительных данных в БД.
  # Генерируется автоматически при первом запуске — НЕ МЕНЯТЬ!
  master-key: ""
  # Сложность BCrypt (10–14 рекомендуется; выше = медленнее, но безопаснее)
  bcrypt-strength: 12

# ── Сессии ──────────────────────────────────
session:
  # Включить сессии (false = вводить пароль при каждом входе)
  enabled: true
  # Длительность сессии в днях (1–28); 0 = сессии отключены
  duration-days: 7
  # Сбрасывать сессию при смене IP-адреса
  bind-to-ip: true

# ── Авторизация ─────────────────────────────
auth:
  # Секунд на прохождение авторизации/регистрации (после — кик)
  timeout-seconds: 90
  # Максимум неверных попыток ввода пароля до блокировки IP
  max-attempts: 3
  # Время блокировки IP в минутах после исчерпания попыток
  lockout-duration-minutes: 60
  # Пропускать авторизацию для лицензионных игроков
  premium-skip: true

# ── Очередь ─────────────────────────────────
queue:
  # Включить систему очереди
  enabled: true
  # Максимум игроков онлайн (при достижении — остальные в очередь)
  max-players: 100

# ── Limbo-мир ───────────────────────────────
limbo:
  # Включить Limbo-мир (если false — игрок остаётся на месте спавна)
  enabled: true
  # Название void-мира для неавторизованных игроков
  world-name: "loveauth_limbo"

# ── Ввод пароля ─────────────────────────────
# Метод по умолчанию для новых игроков (CHAT или SIGN)
# Каждый игрок может сменить в своих настройках (/loveauth account)
default-input-method: "CHAT"

# ── Discord-интеграция ───────────────────────
discord:
  # Включить возможность входа/привязки через Discord-бота
  enabled: false
  # Токен Discord-бота (требуется если enabled: true)
  bot-token: ""
  # ID сервера Discord
  guild-id: ""

# ── Язык ────────────────────────────────────
# Файл языка: plugins/LoveAuth/lang/lang.yml
language: "lang"
